<!DOCTYPE html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"><title>Blockwell</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F172A;color:#F8FAFC;font-family:-apple-system,sans-serif;padding:16px;text-align:center}
h1{color:#4F46E5;font-size:32px;letter-spacing:4px;margin:16px 0 8px}
p{color:#94A3B8;font-size:14px;margin-bottom:16px}
.qr{background:#fff;display:inline-block;padding:16px;border-radius:16px;margin:16px auto}
.qr img{width:200px;height:200px;display:block}
.btn{background:#4F46E5;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:16px;margin:8px;cursor:pointer;text-decoration:none;display:inline-block}
.grid{display:flex;flex-direction:column;gap:12px;max-width:480px;margin:16px auto}
.card{background:#1E293B;border-radius:8px;overflow:hidden}
.card img{width:100%;display:block}
.card .label{padding:6px 10px;color:#94A3B8;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.footer{color:#475569;font-size:11px;padding:24px}
</style></head><body>
<h1>BLOCKWELL</h1>
<p>Modern block puzzle game — skeniraj QR kod za GitHub repo</p>
<div class="qr"><img src="qr-code.png" alt="QR Code"></div>
<p style="color:#F8FAFC;font-size:14px;word-break:break-all">https://github.com/goranboljat-ui/gorandesign</p>
<a class="btn" href="https://github.com/goranboljat-ui/gorandesign">🔗 Otvori GitHub</a>
<div class="grid">
<div class="card"><div class="label">🏠 Početni Ekran</div><img src="home_screen_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">🎮 Gameplay</div><img src="gameplay_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">🎯 Level Select</div><img src="level_select_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">⭐ Daily Challenge</div><img src="daily_challenge_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">🛒 Shop</div><img src="shop_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">⚙️ Settings</div><img src="settings_mockup.png" loading="lazy"></div>
<div class="card"><div class="label">🎨 Block Teme</div><img src="block_themes_concept.png" loading="lazy"></div>
<div class="card"><div class="label">🖼️ Grid Skinovi</div><img src="grid_skins_reference.png" loading="lazy"></div>
</div>
<div class="footer">Blockwell © 2026</div>
</body></html>
