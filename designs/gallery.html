<!DOCTYPE html>
<html><head><title>Blockwell Design Gallery</title>
<style>
body { background: #0F172A; color: #F8FAFC; font-family: Inter, sans-serif; padding: 20px; }
h1 { color: #4F46E5; text-align: center; font-size: 36px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
.card { background: #1E293B; border-radius: 12px; padding: 16px; }
.card h2 { color: #94A3B8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.card img { width: 100%; border-radius: 8px; }
</style></head><body>
<h1>🎨 Blockwell Design Gallery</h1>
<div class="grid">
  <div class="card"><h2>🏠 Home Screen</h2><img src="home_screen_mockup.png"></div>
  <div class="card"><h2>🎮 Gameplay HUD</h2><img src="gameplay_mockup.png"></div>
  <div class="card"><h2>🎯 Level Select</h2><img src="level_select_mockup.png"></div>
  <div class="card"><h2>⭐ Daily Challenge</h2><img src="daily_challenge_mockup.png"></div>
  <div class="card"><h2>🛒 Shop</h2><img src="shop_mockup.png"></div>
  <div class="card"><h2>⚙️ Settings</h2><img src="settings_mockup.png"></div>
  <div class="card"><h2>🎨 Block Themes</h2><img src="block_themes_concept.png"></div>
  <div class="card"><h2>🖼️ Grid Skins</h2><img src="grid_skins_reference.png"></div>
  <div class="card"><h2>📱 App Icon</h2><img src="app_icon.png"></div>
</div></body></html>
